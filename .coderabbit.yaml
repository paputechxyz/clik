# CodeRabbit — https://docs.coderabbit.ai/reference/configuration
# Advisory AI review layer. Its status check is intentionally NOT required
# (see docs/security/maintainer-runbook.md). Tools (eslint, oxlint, semgrep,
# osv-scanner, betterleaks, actionlint, zizmor, ...) are enabled by default;
# this file only tunes review behavior and turns off tools irrelevant to an
# Electron/TypeScript app.
language: en-US

reviews:
  profile: chill
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!dist/**"
    - "!out/**"
    - "!build/**"
    - "!node_modules/**"
    - "!package-lock.json"
  tools:
    tflint:
      enabled: false
    checkov:
      enabled: false
    hadolint:
      enabled: false
    trivy:
      enabled: false
